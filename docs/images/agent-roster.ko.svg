<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" fill="none" role="img" aria-labelledby="ar-title ar-desc">
  <title id="ar-title">팀 소개 — 16개 에이전트</title>
  <desc id="ar-desc">생산(Plan/Do), 리뷰(Check), 인프라 3개 열로 모델 티어 표시와 함께 에이전트를 정리.</desc>

  <!-- Background -->
  <rect width="860" height="460" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">팀 소개 — 16개 에이전트</text>

  <!-- Legend -->
  <circle cx="248" cy="46" r="4" fill="#f85149"/>
  <text x="258" y="50" fill="#8b949e" font-size="9" font-family="SF Mono, Consolas, monospace">opus (3)</text>
  <circle cx="328" cy="46" r="4" fill="#58a6ff"/>
  <text x="338" y="50" fill="#8b949e" font-size="9" font-family="SF Mono, Consolas, monospace">sonnet (7)</text>
  <circle cx="418" cy="46" r="4" fill="#3fb950"/>
  <text x="428" y="50" fill="#8b949e" font-size="9" font-family="SF Mono, Consolas, monospace">haiku (6)</text>

  <!-- Divider -->
  <line x1="20" y1="60" x2="840" y2="60" stroke="#30363d" stroke-width="0.5"/>

  <!-- ===== Column 1: 생산 ===== -->
  <rect x="20" y="68" width="264" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="30" y="83" fill="#58a6ff" font-size="9" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">생산</text>
  <text x="60" y="83" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">Plan / Do</text>

  <!-- 이브이 -->
  <rect x="20" y="98" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="36" cy="124" r="4" fill="#3fb950"/>
  <text x="50" y="118" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">이브이</text>
  <text x="110" y="118" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">haiku</text>
  <text x="50" y="136" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">리서처 — 웹 검색 + 데이터 수집</text>

  <!-- 후딘 -->
  <rect x="20" y="158" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="36" cy="184" r="4" fill="#58a6ff"/>
  <text x="50" y="178" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">후딘</text>
  <text x="100" y="178" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">sonnet</text>
  <text x="50" y="196" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">분석가 — 패턴 인식 + 종합</text>

  <!-- 뮤츠 -->
  <rect x="20" y="218" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="36" cy="244" r="4" fill="#58a6ff"/>
  <text x="50" y="238" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">뮤츠</text>
  <text x="98" y="238" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">sonnet</text>
  <text x="50" y="256" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">전략가 — 프레임워크 적용</text>

  <!-- 루브도 -->
  <rect x="20" y="278" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="36" cy="304" r="4" fill="#f85149"/>
  <text x="50" y="298" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">루브도</text>
  <text x="112" y="298" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">opus</text>
  <text x="50" y="316" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">작가 — 장문 콘텐츠 집필</text>

  <!-- 메타몽 -->
  <rect x="20" y="338" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="36" cy="364" r="4" fill="#f85149"/>
  <text x="50" y="358" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">메타몽</text>
  <text x="116" y="358" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">opus</text>
  <text x="50" y="376" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">에디터 — 콘텐츠 편집 + 개선</text>

  <!-- ===== Column 2: 리뷰 ===== -->
  <rect x="298" y="68" width="264" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="308" y="83" fill="#d29922" font-size="9" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">리뷰</text>
  <text x="338" y="83" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">Check</text>

  <!-- 네이티오 -->
  <rect x="298" y="98" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="314" cy="124" r="4" fill="#f85149"/>
  <text x="328" y="118" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">네이티오</text>
  <text x="404" y="118" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">opus</text>
  <text x="328" y="136" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">심층 리뷰어 — 논리 + 완성도</text>

  <!-- 앱솔 -->
  <rect x="298" y="158" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="314" cy="184" r="4" fill="#58a6ff"/>
  <text x="328" y="178" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">앱솔</text>
  <text x="372" y="178" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">sonnet</text>
  <text x="328" y="196" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">악마의 변호인 — 약점 + 맹점</text>

  <!-- 폴리곤 -->
  <rect x="298" y="218" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="314" cy="244" r="4" fill="#3fb950"/>
  <text x="328" y="238" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">폴리곤</text>
  <text x="386" y="238" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">haiku</text>
  <text x="328" y="256" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">팩트 체커 — 주장 + 출처</text>

  <!-- 푸린 -->
  <rect x="298" y="278" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="314" cy="304" r="4" fill="#3fb950"/>
  <text x="328" y="298" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">푸린</text>
  <text x="370" y="298" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">haiku</text>
  <text x="328" y="316" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">톤 가디언 — 어조 + 독자 적합성</text>

  <!-- 안농 -->
  <rect x="298" y="338" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="314" cy="364" r="4" fill="#3fb950"/>
  <text x="328" y="358" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">안농</text>
  <text x="370" y="358" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">haiku</text>
  <text x="328" y="376" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">구조 분석가 — 구성 + 가독성</text>

  <!-- ===== Column 3: 인프라 ===== -->
  <rect x="576" y="68" width="264" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="586" y="83" fill="#8b949e" font-size="9" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">인프라</text>
  <text x="628" y="83" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">Pipeline / Hunt</text>

  <!-- 아르세우스 -->
  <rect x="576" y="98" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="592" cy="124" r="4" fill="#58a6ff"/>
  <text x="606" y="118" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">아르세우스</text>
  <text x="706" y="118" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">sonnet</text>
  <text x="606" y="136" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">오케스트레이터 — 파이프라인 조율</text>

  <!-- 괴력몬 -->
  <rect x="576" y="158" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="592" cy="184" r="4" fill="#58a6ff"/>
  <text x="606" y="178" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">괴력몬</text>
  <text x="668" y="178" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">sonnet</text>
  <text x="606" y="196" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">단계 실행기 — 단일 스텝 실행</text>

  <!-- 부엉 -->
  <rect x="576" y="218" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="592" cy="244" r="4" fill="#3fb950"/>
  <text x="606" y="238" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">부엉</text>
  <text x="648" y="238" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">haiku</text>
  <text x="606" y="256" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">검색기 — 외부 소스 검색</text>

  <!-- 자포코일 -->
  <rect x="576" y="278" width="264" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="592" cy="304" r="4" fill="#58a6ff"/>
  <text x="606" y="298" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">자포코일</text>
  <text x="682" y="298" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">sonnet</text>
  <text x="606" y="316" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">점검기 — 스킬 후보 검사</text>

  <!-- 테오키스 -->
  <rect x="576" y="338" width="128" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="592" cy="364" r="4" fill="#58a6ff"/>
  <text x="606" y="358" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">테오키스</text>
  <text x="682" y="358" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">sonnet</text>
  <text x="606" y="376" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">평가기</text>

  <!-- 캐이시 -->
  <rect x="712" y="338" width="128" height="52" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="728" cy="364" r="4" fill="#3fb950"/>
  <text x="742" y="358" fill="#e6edf3" font-size="12" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">캐이시</text>
  <text x="796" y="358" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">haiku</text>
  <text x="742" y="376" fill="#8b949e" font-size="10" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">연결기</text>

  <!-- Column dividers -->
  <line x1="288" y1="60" x2="288" y2="440" stroke="#30363d" stroke-width="0.5"/>
  <line x1="566" y1="60" x2="566" y2="440" stroke="#30363d" stroke-width="0.5"/>
</svg>
