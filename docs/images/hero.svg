<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" fill="none" role="img" aria-labelledby="h-title h-desc">
  <title id="h-title">Second Claude Code — Your Second Claude</title>
  <desc id="h-desc">Hero graphic showing PDCA quality cycle with Pokemon-themed agents, quality gates, and supporting commands.</desc>
  <defs>
    <marker id="arr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0.5,0.5 L4,2.5 L0.5,4.5" fill="none" stroke="#484f58" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="12" fill="#0d1117"/>

  <!-- Header -->
  <text x="480" y="46" text-anchor="middle" fill="#e6edf3" font-size="26" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Your Second Claude</text>
  <text x="480" y="68" text-anchor="middle" fill="#8b949e" font-size="11" font-family="SF Mono, Consolas, monospace">9 skills · 16 agents · 15 frameworks</text>

  <!-- Divider -->
  <line x1="40" y1="84" x2="920" y2="84" stroke="#30363d" stroke-width="0.5"/>

  <!-- Left panel -->
  <text x="56" y="140" fill="#e6edf3" font-size="32" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Your second Claude.</text>
  <text x="56" y="178" fill="#e6edf3" font-size="32" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Thinks, writes, reviews.</text>
  <text x="56" y="216" fill="#8b949e" font-size="13" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Plan, Do, Check, Act — with quality gates</text>
  <text x="56" y="236" fill="#8b949e" font-size="13" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">and intelligent Action Router.</text>

  <!-- Vertical divider -->
  <line x1="520" y1="96" x2="520" y2="400" stroke="#30363d" stroke-width="0.5"/>

  <!-- PDCA 2x2 grid -->
  <!-- PLAN card -->
  <rect x="556" y="108" width="168" height="86" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="0.5"/>
  <text x="572" y="128" fill="#58a6ff" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">PLAN</text>
  <text x="572" y="150" fill="#e6edf3" font-size="18" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Gather</text>
  <text x="572" y="170" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">Eevee · Alakazam · Mewtwo</text>
  <text x="572" y="186" fill="#484f58" font-size="9" font-family="SF Mono, Consolas, monospace">haiku · sonnet · sonnet</text>

  <!-- DO card -->
  <rect x="742" y="108" width="168" height="86" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="0.5"/>
  <text x="758" y="128" fill="#3fb950" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">DO</text>
  <text x="758" y="150" fill="#e6edf3" font-size="18" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Produce</text>
  <text x="758" y="170" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">Smeargle</text>
  <text x="758" y="186" fill="#484f58" font-size="9" font-family="SF Mono, Consolas, monospace">opus</text>

  <!-- CHECK card -->
  <rect x="742" y="214" width="168" height="86" rx="6" fill="#161b22" stroke="#d29922" stroke-width="0.5"/>
  <text x="758" y="234" fill="#d29922" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">CHECK</text>
  <text x="758" y="256" fill="#e6edf3" font-size="18" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Verify</text>
  <text x="758" y="276" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">Xatu · Absol +3</text>
  <text x="758" y="292" fill="#484f58" font-size="9" font-family="SF Mono, Consolas, monospace">opus · sonnet · haiku</text>

  <!-- ACT card -->
  <rect x="556" y="214" width="168" height="86" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="0.5"/>
  <text x="572" y="234" fill="#bc8cff" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">ACT</text>
  <text x="572" y="256" fill="#e6edf3" font-size="18" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Refine</text>
  <text x="572" y="276" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">Ditto · Router</text>
  <text x="572" y="292" fill="#484f58" font-size="9" font-family="SF Mono, Consolas, monospace">opus</text>

  <!-- PDCA flow arrows (clockwise) -->
  <line x1="724" y1="151" x2="742" y2="151" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="826" y1="194" x2="826" y2="214" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="742" y1="257" x2="724" y2="257" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="640" y1="214" x2="640" y2="194" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>

  <!-- PDCA center label -->
  <text x="683" y="163" text-anchor="middle" fill="#30363d" font-size="11" font-weight="600" font-family="SF Mono, Consolas, monospace">PDCA</text>

  <!-- Horizontal divider before bottom bar -->
  <line x1="40" y1="406" x2="920" y2="406" stroke="#30363d" stroke-width="0.5"/>

  <!-- Bottom bar -->
  <rect x="56" y="422" width="244" height="72" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="72" y="442" fill="#484f58" font-size="9" font-family="SF Mono, Consolas, monospace">DISCOVER</text>
  <text x="72" y="466" fill="#e6edf3" font-size="17" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Hunt</text>
  <text x="72" y="484" fill="#8b949e" font-size="11" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Find what is missing.</text>

  <rect x="320" y="422" width="200" height="72" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="336" y="442" fill="#484f58" font-size="9" font-family="SF Mono, Consolas, monospace">COLLECT</text>
  <text x="336" y="466" fill="#e6edf3" font-size="17" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Collect</text>
  <text x="336" y="484" fill="#8b949e" font-size="11" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Keep source notes.</text>

  <rect x="540" y="422" width="364" height="72" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="556" y="442" fill="#484f58" font-size="9" font-family="SF Mono, Consolas, monospace">PIPELINE</text>
  <text x="556" y="466" fill="#e6edf3" font-size="17" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Pipeline</text>
  <text x="556" y="484" fill="#8b949e" font-size="11" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Repeat proven flows.</text>
</svg>
