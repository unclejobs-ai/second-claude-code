<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" fill="none" role="img" aria-labelledby="h-title h-desc">
  <title id="h-title">Second Claude Code — One prompt to finished output</title>
  <desc id="h-desc">Type one prompt: the system gathers sources, writes a draft, reviews with 5 agents, and auto-fixes. Or pick any skill individually.</desc>
  <defs>
    <marker id="arr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0.5,0.5 L4,2.5 L0.5,4.5" fill="none" stroke="#484f58" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="460" rx="12" fill="#0d1117"/>

  <!-- Header -->
  <text x="480" y="38" text-anchor="middle" fill="#e6edf3" font-size="24" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Second Claude Code</text>
  <text x="480" y="60" text-anchor="middle" fill="#8b949e" font-size="13" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">One prompt. Researched, reviewed, ready.</text>

  <!-- Divider -->
  <line x1="40" y1="78" x2="920" y2="78" stroke="#30363d" stroke-width="0.5"/>

  <!-- Terminal prompt -->
  <rect x="140" y="98" width="680" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="160" y="125" fill="#3fb950" font-size="14" font-weight="600" font-family="SF Mono, Consolas, monospace">&gt;</text>
  <text x="178" y="125" fill="#e6edf3" font-size="14" font-family="SF Mono, Consolas, monospace">Research AI agents and write a report</text>

  <!-- Arrow: terminal → cards -->
  <line x1="480" y1="142" x2="480" y2="174" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ===== 4 Phase cards (horizontal) ===== -->

  <!-- Card 1: Gather (PLAN) -->
  <rect x="122" y="184" width="164" height="86" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="122" y="184" width="3" height="86" rx="1.5" fill="#58a6ff"/>
  <text x="138" y="204" fill="#58a6ff" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">PLAN</text>
  <text x="138" y="230" fill="#e6edf3" font-size="20" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Gather</text>
  <text x="138" y="252" fill="#8b949e" font-size="10" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">20+ sources crawled</text>

  <!-- Arrow → -->
  <line x1="286" y1="227" x2="302" y2="227" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Card 2: Write (DO) -->
  <rect x="306" y="184" width="164" height="86" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="306" y="184" width="3" height="86" rx="1.5" fill="#3fb950"/>
  <text x="322" y="204" fill="#3fb950" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">DO</text>
  <text x="322" y="230" fill="#e6edf3" font-size="20" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Write</text>
  <text x="322" y="252" fill="#8b949e" font-size="10" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Full draft from research</text>

  <!-- Arrow → -->
  <line x1="470" y1="227" x2="486" y2="227" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Card 3: Review (CHECK) -->
  <rect x="490" y="184" width="164" height="86" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="490" y="184" width="3" height="86" rx="1.5" fill="#d29922"/>
  <text x="506" y="204" fill="#d29922" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">CHECK</text>
  <text x="506" y="230" fill="#e6edf3" font-size="20" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Review</text>
  <text x="506" y="252" fill="#8b949e" font-size="10" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">5 reviewers in parallel</text>

  <!-- Arrow → -->
  <line x1="654" y1="227" x2="670" y2="227" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Card 4: Refine (ACT) -->
  <rect x="674" y="184" width="164" height="86" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="674" y="184" width="3" height="86" rx="1.5" fill="#bc8cff"/>
  <text x="690" y="204" fill="#bc8cff" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">ACT</text>
  <text x="690" y="230" fill="#e6edf3" font-size="20" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Refine</text>
  <text x="690" y="252" fill="#8b949e" font-size="10" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Auto-fix by root cause</text>

  <!-- Result line -->
  <text x="480" y="292" text-anchor="middle" font-size="12" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"><tspan fill="#3fb950" font-weight="600">&#x2713;</tspan><tspan fill="#8b949e">  Researched &#xB7; Reviewed &#xB7; Ready</tspan></text>

  <!-- Divider -->
  <line x1="40" y1="314" x2="920" y2="314" stroke="#30363d" stroke-width="0.5"/>

  <!-- Skills section header -->
  <text x="480" y="342" text-anchor="middle" fill="#8b949e" font-size="12" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Or just pick one:</text>

  <!-- Skill pills — Row 1 -->
  <rect x="246" y="358" width="84" height="28" rx="14" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="288" y="377" text-anchor="middle" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">research</text>

  <rect x="342" y="358" width="84" height="28" rx="14" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="384" y="377" text-anchor="middle" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">write</text>

  <rect x="438" y="358" width="84" height="28" rx="14" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="480" y="377" text-anchor="middle" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">review</text>

  <rect x="534" y="358" width="84" height="28" rx="14" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="576" y="377" text-anchor="middle" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">analyze</text>

  <rect x="630" y="358" width="84" height="28" rx="14" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="672" y="377" text-anchor="middle" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">loop</text>

  <!-- Skill pills — Row 2 -->
  <rect x="294" y="398" width="84" height="28" rx="14" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="336" y="417" text-anchor="middle" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">collect</text>

  <rect x="390" y="398" width="84" height="28" rx="14" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="432" y="417" text-anchor="middle" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">workflow</text>

  <rect x="486" y="398" width="84" height="28" rx="14" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="528" y="417" text-anchor="middle" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">discover</text>

  <rect x="582" y="398" width="84" height="28" rx="14" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="624" y="417" text-anchor="middle" fill="#8b949e" font-size="10" font-family="SF Mono, Consolas, monospace">pdca</text>
</svg>