<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 640" fill="none" role="img" aria-labelledby="pc-title pc-desc">
  <title id="pc-title">PDCA Quality Cycle with Action Router</title>
  <desc id="pc-desc">Vertical flow diagram showing Plan, Do, Check, Act phases. The Action Router classifies review failures by root cause and routes back to the originating phase.</desc>
  <defs>
    <linearGradient id="pc-bg" x1="0" y1="0" x2="820" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c1018"/><stop offset="1" stop-color="#080b10"/>
    </linearGradient>
    <radialGradient id="hub-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b39ddb" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#b39ddb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hub-fill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#241838"/><stop offset="100%" stop-color="#18102a"/>
    </radialGradient>
    <marker id="pc-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M1,0.5 L7,3 L1,5.5" fill="none" stroke="#4a5e6d" stroke-width="1.4" stroke-linecap="round"/>
    </marker>
    <marker id="pc-arr-ok" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M1,0.5 L7,3 L1,5.5" fill="none" stroke="#4caf50" stroke-width="1.4" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="640" rx="20" fill="url(#pc-bg)"/>

  <!-- ===== PHASE BOXES ===== -->

  <!-- PLAN -->
  <rect x="200" y="20" width="400" height="58" rx="14" fill="#0f1a28" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="222" y="42" fill="#5b9bd5" font-size="10" letter-spacing="2.5" font-weight="600" font-family="IBM Plex Mono, monospace">PLAN</text>
  <text x="280" y="42" fill="#dce4ed" font-size="13" font-weight="700" font-family="-apple-system, Segoe UI, sans-serif">Gather</text>
  <text x="222" y="58" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">Question Protocol → research → analyze</text>
  <text x="222" y="72" fill="#6b7a8a" font-size="9" font-family="IBM Plex Mono, monospace">Eevee · Alakazam · Mewtwo</text>

  <!-- Gate -->
  <line x1="400" y1="78" x2="400" y2="98" stroke="#3d4d5d" stroke-width="1.3" marker-end="url(#pc-arr)"/>
  <rect x="306" y="84" width="188" height="14" rx="4" fill="#131a22" stroke="#2a3644" stroke-width="0.6"/>
  <text x="400" y="94" text-anchor="middle" fill="#6a7a8a" font-size="8" font-family="IBM Plex Mono, monospace">Brief + Analysis? Sources ≥ 3?</text>

  <!-- DO -->
  <rect x="200" y="104" width="400" height="58" rx="14" fill="#0f201a" stroke="#7fd6c2" stroke-width="1.2"/>
  <text x="222" y="126" fill="#7fd6c2" font-size="10" letter-spacing="2.5" font-weight="600" font-family="IBM Plex Mono, monospace">DO</text>
  <text x="256" y="126" fill="#dce4ed" font-size="13" font-weight="700" font-family="-apple-system, sans-serif">Produce</text>
  <text x="222" y="142" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">write --skip-research --skip-review (pure execution)</text>
  <text x="222" y="156" fill="#6b7a8a" font-size="9" font-family="IBM Plex Mono, monospace">Smeargle</text>

  <!-- Gate -->
  <line x1="400" y1="162" x2="400" y2="182" stroke="#3d4d5d" stroke-width="1.3" marker-end="url(#pc-arr)"/>
  <rect x="310" y="168" width="180" height="14" rx="4" fill="#131a22" stroke="#2a3644" stroke-width="0.6"/>
  <text x="400" y="178" text-anchor="middle" fill="#6a7a8a" font-size="8" font-family="IBM Plex Mono, monospace">Artifact complete? Format OK?</text>

  <!-- CHECK -->
  <rect x="200" y="188" width="400" height="58" rx="14" fill="#1a1810" stroke="#c9b48f" stroke-width="1.2"/>
  <text x="222" y="210" fill="#c9b48f" font-size="10" letter-spacing="2.5" font-weight="600" font-family="IBM Plex Mono, monospace">CHECK</text>
  <text x="290" y="210" fill="#dce4ed" font-size="13" font-weight="700" font-family="-apple-system, sans-serif">Verify</text>
  <text x="222" y="226" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">5 parallel reviewers → Consensus Gate → Verdict</text>
  <text x="222" y="240" fill="#6b7a8a" font-size="9" font-family="IBM Plex Mono, monospace">Xatu · Absol · Porygon · Jigglypuff · Unown</text>

  <!-- APPROVED -->
  <line x1="600" y1="217" x2="636" y2="217" stroke="#4caf50" stroke-width="1.8" marker-end="url(#pc-arr-ok)"/>
  <rect x="644" y="201" width="130" height="32" rx="10" fill="#142014" stroke="#4caf50" stroke-width="1.2"/>
  <text x="709" y="222" text-anchor="middle" fill="#81c784" font-size="13" font-weight="700" font-family="-apple-system, sans-serif">APPROVED</text>

  <!-- Feedback arrow -->
  <line x1="400" y1="246" x2="400" y2="268" stroke="#3d4d5d" stroke-width="1.3" marker-end="url(#pc-arr)"/>
  <text x="418" y="262" fill="#6a7a8a" font-size="8" font-family="IBM Plex Mono, monospace">feedback</text>

  <!-- ACT -->
  <rect x="200" y="274" width="400" height="58" rx="14" fill="#18102a" stroke="#b39ddb" stroke-width="1.2"/>
  <text x="222" y="296" fill="#b39ddb" font-size="10" letter-spacing="2.5" font-weight="600" font-family="IBM Plex Mono, monospace">ACT</text>
  <text x="260" y="296" fill="#dce4ed" font-size="13" font-weight="700" font-family="-apple-system, sans-serif">Refine</text>
  <text x="222" y="312" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">Classify review feedback by root cause → route to source phase</text>
  <text x="222" y="326" fill="#6b7a8a" font-size="9" font-family="IBM Plex Mono, monospace">Ditto</text>

  <!-- ===== TRANSITION ===== -->
  <line x1="400" y1="332" x2="400" y2="370" stroke="#b39ddb" stroke-width="2" stroke-dasharray="4 4" opacity=".6"/>

  <!-- ===== ACTION ROUTER — ORBITAL HUB ===== -->

  <!-- Outer glow -->
  <circle cx="400" cy="430" r="110" fill="url(#hub-glow)"/>

  <!-- Orbital rings -->
  <ellipse cx="400" cy="430" rx="92" ry="92" fill="none" stroke="#2a1e40" stroke-width="1" stroke-dasharray="3 6" opacity=".7"/>
  <ellipse cx="400" cy="430" rx="68" ry="68" fill="none" stroke="#3a2856" stroke-width="0.8" stroke-dasharray="2 8" opacity=".5"/>

  <!-- Orbital dots -->
  <circle cx="330" cy="390" r="2.5" fill="#b39ddb" opacity=".5"/>
  <circle cx="470" cy="390" r="2" fill="#5b9bd5" opacity=".4"/>
  <circle cx="345" cy="475" r="2" fill="#7fd6c2" opacity=".4"/>
  <circle cx="460" cy="470" r="2.5" fill="#b39ddb" opacity=".3"/>

  <!-- Hub body -->
  <circle cx="400" cy="430" r="46" fill="url(#hub-fill)" stroke="#b39ddb" stroke-width="1.8"/>
  <circle cx="400" cy="430" r="34" fill="none" stroke="#3a2856" stroke-width="0.6"/>

  <!-- Hub label -->
  <text x="400" y="422" text-anchor="middle" fill="#e0d4f0" font-size="11" font-weight="700" letter-spacing="1" font-family="IBM Plex Mono, monospace">ACTION</text>
  <text x="400" y="438" text-anchor="middle" fill="#e0d4f0" font-size="11" font-weight="700" letter-spacing="1" font-family="IBM Plex Mono, monospace">ROUTER</text>
  <text x="400" y="452" text-anchor="middle" fill="#8a6aaa" font-size="7" font-family="IBM Plex Mono, monospace">ROOT CAUSE</text>

  <!-- ===== 3 ROUTE PATHS ===== -->

  <!-- LEFT: → PLAN -->
  <path d="M354,430 C280,430 220,430 170,442" stroke="#5b9bd5" stroke-width="2.4" stroke-dasharray="6 4" fill="none"/>
  <rect x="24" y="408" width="200" height="90" rx="16" fill="#0c1420" stroke="#5b9bd5" stroke-width="1.4"/>
  <rect x="24" y="408" width="6" height="90" rx="3" fill="#5b9bd5"/>
  <text x="46" y="434" fill="#5b9bd5" font-size="15" font-weight="800" font-family="IBM Plex Mono, monospace">↻ PLAN</text>
  <text x="46" y="456" fill="#9abacc" font-size="11.5" font-weight="600" font-family="-apple-system, sans-serif">source / assumption error</text>
  <text x="46" y="476" fill="#5a7a9a" font-size="10" font-family="-apple-system, sans-serif">Re-run research phase.</text>
  <text x="46" y="490" fill="#3a5a7a" font-size="9" font-family="IBM Plex Mono, monospace">"data from 2019"</text>

  <!-- DOWN: → DO -->
  <path d="M400,476 C400,510 400,530 400,548" stroke="#7fd6c2" stroke-width="2.4" stroke-dasharray="6 4" fill="none"/>
  <rect x="300" y="552" width="200" height="80" rx="16" fill="#0c1a14" stroke="#7fd6c2" stroke-width="1.4"/>
  <rect x="300" y="552" width="6" height="80" rx="3" fill="#7fd6c2"/>
  <text x="322" y="578" fill="#7fd6c2" font-size="15" font-weight="800" font-family="IBM Plex Mono, monospace">↻ DO</text>
  <text x="322" y="600" fill="#8cbeb2" font-size="11.5" font-weight="600" font-family="-apple-system, sans-serif">completeness / format</text>
  <text x="322" y="620" fill="#5a9a7a" font-size="10" font-family="-apple-system, sans-serif">Rewrite missing sections.</text>

  <!-- RIGHT: → LOOP -->
  <path d="M446,430 C520,430 580,430 630,442" stroke="#b39ddb" stroke-width="2.4" stroke-dasharray="6 4" fill="none"/>
  <rect x="576" y="408" width="218" height="90" rx="16" fill="#140c20" stroke="#b39ddb" stroke-width="1.4"/>
  <rect x="788" y="408" width="6" height="90" rx="3" fill="#b39ddb"/>
  <text x="596" y="434" fill="#b39ddb" font-size="15" font-weight="800" font-family="IBM Plex Mono, monospace">↻ LOOP → CHECK</text>
  <text x="596" y="456" fill="#b0a0c8" font-size="11.5" font-weight="600" font-family="-apple-system, sans-serif">execution quality</text>
  <text x="596" y="476" fill="#8a6aaa" font-size="10" font-family="-apple-system, sans-serif">Refine and re-verify.</text>
  <text x="596" y="490" fill="#6a4a8a" font-size="9" font-family="IBM Plex Mono, monospace">"verbose", "tone mismatch"</text>
</svg>