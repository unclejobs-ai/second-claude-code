<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540" fill="none" role="img" aria-labelledby="pc-title pc-desc">
  <title id="pc-title">PDCA Quality Cycle</title>
  <desc id="pc-desc">Every output passes through Plan, Do, Check, Act with quality gates. Problems route back to the phase that caused them.</desc>
  <defs>
    <marker id="arr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0.5,0.5 L4,2.5 L0.5,4.5" fill="none" stroke="#484f58" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0.5,0.5 L4,2.5 L0.5,4.5" fill="none" stroke="#3fb950" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0.5,0.5 L4,2.5 L0.5,4.5" fill="none" stroke="#58a6ff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-act" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0.5,0.5 L4,2.5 L0.5,4.5" fill="none" stroke="#bc8cff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="540" rx="12" fill="#0d1117"/>

  <!-- Philosophy header -->
  <text x="390" y="36" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Every output earns its way out.</text>
  <text x="390" y="58" text-anchor="middle" fill="#8b949e" font-size="11" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Plan, Do, Check, Act &#x2014; with quality gates between phases.</text>

  <!-- Divider -->
  <line x1="30" y1="74" x2="750" y2="74" stroke="#30363d" stroke-width="0.5"/>

  <!-- ===== PLAN ===== -->
  <rect x="170" y="94" width="440" height="58" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="170" y="94" width="3" height="58" rx="1.5" fill="#58a6ff"/>
  <text x="186" y="114" fill="#58a6ff" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">PLAN</text>
  <text x="230" y="114" fill="#e6edf3" font-size="13" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Gather evidence first</text>
  <text x="186" y="134" fill="#8b949e" font-size="9" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Research the topic, find sources before writing</text>

  <!-- Gate 1 -->
  <line x1="390" y1="152" x2="390" y2="170" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <text x="398" y="166" fill="#484f58" font-size="8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">enough evidence?</text>

  <!-- ===== DO ===== -->
  <rect x="170" y="174" width="440" height="58" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="170" y="174" width="3" height="58" rx="1.5" fill="#3fb950"/>
  <text x="186" y="194" fill="#3fb950" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">DO</text>
  <text x="214" y="194" fill="#e6edf3" font-size="13" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Write from what you found</text>
  <text x="186" y="214" fill="#8b949e" font-size="9" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">One writer, one full draft from the research</text>

  <!-- Gate 2 -->
  <line x1="390" y1="232" x2="390" y2="250" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <text x="398" y="246" fill="#484f58" font-size="8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">draft complete?</text>

  <!-- ===== CHECK ===== -->
  <rect x="170" y="254" width="440" height="58" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="170" y="254" width="3" height="58" rx="1.5" fill="#d29922"/>
  <text x="186" y="274" fill="#d29922" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">CHECK</text>
  <text x="242" y="274" fill="#e6edf3" font-size="13" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">5 reviewers attack your draft</text>
  <text x="186" y="294" fill="#8b949e" font-size="9" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Logic &#xB7; Facts &#xB7; Tone &#xB7; Structure &#xB7; Weak points</text>

  <!-- Done branch (right) -->
  <line x1="610" y1="274" x2="632" y2="274" stroke="#3fb950" stroke-width="0.5" opacity="0.6" marker-end="url(#arr-green)"/>
  <rect x="636" y="260" width="108" height="28" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="0.5"/>
  <text x="690" y="278" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600" font-family="SF Mono, Consolas, monospace">Done &#x2713;</text>

  <!-- Gate 3 -->
  <line x1="390" y1="312" x2="390" y2="330" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <text x="398" y="326" fill="#484f58" font-size="8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">needs work</text>

  <!-- ===== ACT ===== -->
  <rect x="170" y="334" width="440" height="58" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="170" y="334" width="3" height="58" rx="1.5" fill="#bc8cff"/>
  <text x="186" y="354" fill="#bc8cff" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">ACT</text>
  <text x="220" y="354" fill="#e6edf3" font-size="13" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Fix the root cause</text>
  <text x="186" y="374" fill="#8b949e" font-size="9" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Route each problem to the phase that caused it</text>

  <!-- Transition arrows to routing cards -->
  <line x1="260" y1="392" x2="170" y2="418" stroke="#58a6ff" stroke-width="0.5" opacity="0.5" marker-end="url(#arr-blue)"/>
  <line x1="390" y1="392" x2="390" y2="418" stroke="#3fb950" stroke-width="0.5" opacity="0.5" marker-end="url(#arr-green)"/>
  <line x1="520" y1="392" x2="610" y2="418" stroke="#bc8cff" stroke-width="0.5" opacity="0.5" marker-end="url(#arr-act)"/>

  <!-- ===== 3 Routing cards ===== -->

  <!-- ↻ PLAN -->
  <rect x="70" y="422" width="200" height="72" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="70" y="422" width="3" height="72" rx="1.5" fill="#58a6ff"/>
  <text x="86" y="446" fill="#58a6ff" font-size="11" font-weight="600" font-family="SF Mono, Consolas, monospace">&#x21BB; PLAN</text>
  <text x="86" y="464" fill="#8b949e" font-size="9" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Research gap</text>
  <text x="86" y="480" fill="#484f58" font-size="8.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Re-gather evidence</text>

  <!-- ↻ DO -->
  <rect x="290" y="422" width="200" height="72" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="290" y="422" width="3" height="72" rx="1.5" fill="#3fb950"/>
  <text x="306" y="446" fill="#3fb950" font-size="11" font-weight="600" font-family="SF Mono, Consolas, monospace">&#x21BB; DO</text>
  <text x="306" y="464" fill="#8b949e" font-size="9" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Missing section</text>
  <text x="306" y="480" fill="#484f58" font-size="8.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Rewrite from plan</text>

  <!-- ↻ LOOP -->
  <rect x="510" y="422" width="200" height="72" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="510" y="422" width="3" height="72" rx="1.5" fill="#bc8cff"/>
  <text x="526" y="446" fill="#bc8cff" font-size="11" font-weight="600" font-family="SF Mono, Consolas, monospace">&#x21BB; LOOP</text>
  <text x="526" y="464" fill="#8b949e" font-size="9" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Polish needed</text>
  <text x="526" y="480" fill="#484f58" font-size="8.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Refine and re-check</text>
</svg>