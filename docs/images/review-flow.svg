<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" fill="none" role="img" aria-labelledby="rf-title rf-desc">
  <title id="rf-title">Multi-Perspective Review Flow</title>
  <desc id="rf-desc">Five parallel reviewers feed into a Consensus Gate that produces one of four verdicts.</desc>
  <defs>
    <marker id="arr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0.5,0.5 L4,2.5 L0.5,4.5" fill="none" stroke="#484f58" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="420" rx="12" fill="#0d1117"/>

  <!-- ===== DISPATCH ===== -->
  <rect x="20" y="160" width="108" height="72" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="74" y="192" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Dispatch</text>
  <text x="74" y="210" text-anchor="middle" fill="#8b949e" font-size="9" font-family="SF Mono, Consolas, monospace">preset-based</text>
  <text x="74" y="224" text-anchor="middle" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">5 reviewers</text>

  <!-- Dispatch → Reviewers lines -->
  <line x1="128" y1="176" x2="164" y2="68" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="128" y1="184" x2="164" y2="130" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="128" y1="196" x2="164" y2="196" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="128" y1="208" x2="164" y2="262" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="128" y1="216" x2="164" y2="326" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>

  <!-- ===== 5 REVIEWERS ===== -->

  <!-- Xatu — opus (red accent bar) -->
  <rect x="168" y="44" width="272" height="48" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="168" y="44" width="3" height="48" rx="1.5" fill="#f85149"/>
  <text x="182" y="64" fill="#e6edf3" font-size="12" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Xatu</text>
  <text x="222" y="64" fill="#f85149" font-size="8.5" font-weight="600" font-family="SF Mono, Consolas, monospace">opus</text>
  <text x="182" y="80" fill="#8b949e" font-size="9.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Deep Reviewer — logic, structure, completeness</text>

  <!-- Absol — sonnet (blue accent bar) -->
  <rect x="168" y="104" width="272" height="48" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="168" y="104" width="3" height="48" rx="1.5" fill="#58a6ff"/>
  <text x="182" y="124" fill="#e6edf3" font-size="12" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Absol</text>
  <text x="228" y="124" fill="#58a6ff" font-size="8.5" font-weight="600" font-family="SF Mono, Consolas, monospace">sonnet</text>
  <text x="182" y="140" fill="#8b949e" font-size="9.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Devil's Advocate — weaknesses, blind spots</text>

  <!-- Porygon — haiku (green accent bar) -->
  <rect x="168" y="164" width="272" height="48" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="168" y="164" width="3" height="48" rx="1.5" fill="#3fb950"/>
  <text x="182" y="184" fill="#e6edf3" font-size="12" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Porygon</text>
  <text x="252" y="184" fill="#3fb950" font-size="8.5" font-weight="600" font-family="SF Mono, Consolas, monospace">haiku</text>
  <text x="182" y="200" fill="#8b949e" font-size="9.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Fact Checker — claims, numbers, sources</text>

  <!-- Jigglypuff — haiku (green accent bar) -->
  <rect x="168" y="224" width="272" height="48" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="168" y="224" width="3" height="48" rx="1.5" fill="#3fb950"/>
  <text x="182" y="244" fill="#e6edf3" font-size="12" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Jigglypuff</text>
  <text x="268" y="244" fill="#3fb950" font-size="8.5" font-weight="600" font-family="SF Mono, Consolas, monospace">haiku</text>
  <text x="182" y="260" fill="#8b949e" font-size="9.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Tone Guardian — voice, audience fit</text>

  <!-- Unown — haiku (green accent bar) -->
  <rect x="168" y="284" width="272" height="48" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="168" y="284" width="3" height="48" rx="1.5" fill="#3fb950"/>
  <text x="182" y="304" fill="#e6edf3" font-size="12" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Unown</text>
  <text x="236" y="304" fill="#3fb950" font-size="8.5" font-weight="600" font-family="SF Mono, Consolas, monospace">haiku</text>
  <text x="182" y="320" fill="#8b949e" font-size="9.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Structure Analyst — organization, readability</text>

  <!-- Reviewers → Gate lines -->
  <line x1="440" y1="68" x2="500" y2="176" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="440" y1="128" x2="500" y2="186" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="440" y1="188" x2="500" y2="196" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="440" y1="248" x2="500" y2="208" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="440" y1="308" x2="500" y2="218" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>

  <!-- ===== CONSENSUS GATE ===== -->
  <rect x="504" y="152" width="108" height="88" rx="6" fill="#161b22" stroke="#d29922" stroke-width="0.5"/>
  <text x="558" y="178" text-anchor="middle" fill="#d29922" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">CONSENSUS</text>
  <text x="558" y="192" text-anchor="middle" fill="#d29922" font-size="9" font-weight="600" font-family="SF Mono, Consolas, monospace">GATE</text>
  <line x1="520" y1="202" x2="596" y2="202" stroke="#30363d" stroke-width="0.5"/>
  <text x="558" y="218" text-anchor="middle" fill="#8b949e" font-size="8.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">2/3 pass = OK</text>
  <text x="558" y="232" text-anchor="middle" fill="#484f58" font-size="8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">3/5 for full preset</text>

  <!-- Gate → Verdicts lines -->
  <line x1="612" y1="172" x2="672" y2="98" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="612" y1="186" x2="672" y2="176" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="612" y1="210" x2="672" y2="268" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="612" y1="224" x2="672" y2="350" stroke="#30363d" stroke-width="0.5" marker-end="url(#arr)"/>

  <!-- ===== 4 VERDICTS ===== -->

  <!-- APPROVED -->
  <rect x="676" y="76" width="164" height="44" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="676" y="76" width="3" height="44" rx="1.5" fill="#3fb950"/>
  <text x="752" y="103" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600" font-family="SF Mono, Consolas, monospace">APPROVED</text>

  <!-- MINOR FIXES -->
  <rect x="676" y="156" width="164" height="44" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="676" y="156" width="3" height="44" rx="1.5" fill="#d29922"/>
  <text x="752" y="183" text-anchor="middle" fill="#d29922" font-size="11" font-weight="600" font-family="SF Mono, Consolas, monospace">MINOR FIXES</text>

  <!-- NEEDS IMPROVEMENT -->
  <rect x="676" y="244" width="164" height="44" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="676" y="244" width="3" height="44" rx="1.5" fill="#d29922" opacity="0.6"/>
  <text x="752" y="271" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="600" font-family="SF Mono, Consolas, monospace">NEEDS IMPROV.</text>

  <!-- MUST FIX -->
  <rect x="676" y="328" width="164" height="44" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <rect x="676" y="328" width="3" height="44" rx="1.5" fill="#f85149"/>
  <text x="752" y="355" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600" font-family="SF Mono, Consolas, monospace">MUST FIX</text>

  <!-- Bottom legend -->
  <line x1="40" y1="396" x2="820" y2="396" stroke="#30363d" stroke-width="0.5"/>
  <text x="430" y="412" text-anchor="middle" fill="#484f58" font-size="8.5" font-family="SF Mono, Consolas, monospace">Any Critical finding → MUST FIX regardless of vote count</text>
</svg>
