<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" fill="none" role="img" aria-labelledby="rf-title rf-desc">
  <title id="rf-title">Multi-Perspective Review Flow</title>
  <desc id="rf-desc">Five parallel reviewers feed into a Consensus Gate that produces one of four verdicts.</desc>
  <defs>
    <linearGradient id="rf-bg" x1="0" y1="0" x2="860" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c1018"/><stop offset="1" stop-color="#080b10"/>
    </linearGradient>
    <radialGradient id="gate-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9b48f" stop-opacity=".12"/><stop offset="100%" stop-color="#c9b48f" stop-opacity="0"/>
    </radialGradient>
    <marker id="rf-arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,0.5 L6,2.5 L1,4.5" fill="none" stroke="#4a5e6d" stroke-width="1.2" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="420" rx="20" fill="url(#rf-bg)"/>
  <circle cx="140" cy="200" r="120" fill="#5b9bd5" fill-opacity=".02"/>
  <circle cx="560" cy="200" r="100" fill="#c9b48f" fill-opacity=".03"/>
  <circle cx="760" cy="200" r="80" fill="#4caf50" fill-opacity=".02"/>

  <!-- ===== DISPATCH ===== -->
  <rect x="24" y="168" width="108" height="64" rx="14" fill="#121820" stroke="#3a4858" stroke-width="1"/>
  <text x="78" y="194" text-anchor="middle" fill="#dce4ed" font-size="13" font-weight="700" font-family="-apple-system, sans-serif">Dispatch</text>
  <text x="78" y="212" text-anchor="middle" fill="#6b7a8a" font-size="9" font-family="IBM Plex Mono, monospace">preset-based</text>

  <!-- ===== 5 REVIEWERS with accent bars ===== -->

  <!-- Xatu — opus (red accent) -->
  <rect x="170" y="42" width="270" height="50" rx="12" fill="#121820" stroke="#252f3a" stroke-width="0.8"/>
  <rect x="170" y="42" width="5" height="50" rx="2" fill="#e57373"/>
  <text x="190" y="63" fill="#f5f7fb" font-size="12" font-weight="700" font-family="-apple-system, sans-serif">Xatu</text>
  <text x="232" y="63" fill="#e57373" font-size="9" font-weight="600" font-family="IBM Plex Mono, monospace">opus</text>
  <text x="190" y="81" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">Deep Reviewer — logic, structure, completeness</text>

  <!-- Absol — sonnet (blue accent) -->
  <rect x="170" y="104" width="270" height="50" rx="12" fill="#121820" stroke="#252f3a" stroke-width="0.8"/>
  <rect x="170" y="104" width="5" height="50" rx="2" fill="#64b5f6"/>
  <text x="190" y="125" fill="#f5f7fb" font-size="12" font-weight="700" font-family="-apple-system, sans-serif">Absol</text>
  <text x="236" y="125" fill="#64b5f6" font-size="9" font-weight="600" font-family="IBM Plex Mono, monospace">sonnet</text>
  <text x="190" y="143" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">Devil's Advocate — weaknesses, blind spots</text>

  <!-- Porygon — haiku (green accent) -->
  <rect x="170" y="166" width="270" height="50" rx="12" fill="#121820" stroke="#252f3a" stroke-width="0.8"/>
  <rect x="170" y="166" width="5" height="50" rx="2" fill="#81c784"/>
  <text x="190" y="187" fill="#f5f7fb" font-size="12" font-weight="700" font-family="-apple-system, sans-serif">Porygon</text>
  <text x="254" y="187" fill="#81c784" font-size="9" font-weight="600" font-family="IBM Plex Mono, monospace">haiku</text>
  <text x="190" y="205" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">Fact Checker — claims, numbers, sources</text>

  <!-- Jigglypuff — haiku (green accent) -->
  <rect x="170" y="228" width="270" height="50" rx="12" fill="#121820" stroke="#252f3a" stroke-width="0.8"/>
  <rect x="170" y="228" width="5" height="50" rx="2" fill="#81c784"/>
  <text x="190" y="249" fill="#f5f7fb" font-size="12" font-weight="700" font-family="-apple-system, sans-serif">Jigglypuff</text>
  <text x="268" y="249" fill="#81c784" font-size="9" font-weight="600" font-family="IBM Plex Mono, monospace">haiku</text>
  <text x="190" y="267" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">Tone Guardian — voice, audience fit</text>

  <!-- Unown — haiku (green accent) -->
  <rect x="170" y="290" width="270" height="50" rx="12" fill="#121820" stroke="#252f3a" stroke-width="0.8"/>
  <rect x="170" y="290" width="5" height="50" rx="2" fill="#81c784"/>
  <text x="190" y="311" fill="#f5f7fb" font-size="12" font-weight="700" font-family="-apple-system, sans-serif">Unown</text>
  <text x="240" y="311" fill="#81c784" font-size="9" font-weight="600" font-family="IBM Plex Mono, monospace">haiku</text>
  <text x="190" y="329" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">Structure Analyst — organization, readability</text>

  <!-- Dispatch → Reviewers -->
  <line x1="132" y1="182" x2="170" y2="67" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="132" y1="190" x2="170" y2="129" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="132" y1="200" x2="170" y2="191" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="132" y1="210" x2="170" y2="253" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="132" y1="218" x2="170" y2="315" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>

  <!-- Reviewers → Gate -->
  <line x1="440" y1="67" x2="512" y2="180" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="440" y1="129" x2="512" y2="188" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="440" y1="191" x2="512" y2="200" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="440" y1="253" x2="512" y2="212" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="440" y1="315" x2="512" y2="220" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>

  <!-- ===== CONSENSUS GATE (with glow) ===== -->
  <circle cx="568" cy="200" r="70" fill="url(#gate-glow)"/>
  <rect x="518" y="156" width="100" height="88" rx="18" fill="#16140c" stroke="#c9b48f" stroke-width="1.4"/>
  <text x="568" y="186" text-anchor="middle" fill="#c9b48f" font-size="10" letter-spacing="1.5" font-weight="700" font-family="IBM Plex Mono, monospace">CONSENSUS</text>
  <text x="568" y="202" text-anchor="middle" fill="#c9b48f" font-size="10" letter-spacing="1.5" font-weight="700" font-family="IBM Plex Mono, monospace">GATE</text>
  <line x1="538" y1="212" x2="598" y2="212" stroke="#32414d" stroke-width="0.6"/>
  <text x="568" y="228" text-anchor="middle" fill="#8c9aa8" font-size="9" font-family="-apple-system, sans-serif">2/3 pass = OK</text>
  <text x="568" y="240" text-anchor="middle" fill="#6b7a8a" font-size="8" font-family="-apple-system, sans-serif">3/5 for full preset</text>

  <!-- Gate → Verdicts -->
  <line x1="618" y1="176" x2="680" y2="95" stroke="#3d4d5d" stroke-width="1.2" marker-end="url(#rf-arr)"/>
  <line x1="618" y1="190" x2="680" y2="185" stroke="#3d4d5d" stroke-width="1.2" marker-end="url(#rf-arr)"/>
  <line x1="618" y1="210" x2="680" y2="275" stroke="#3d4d5d" stroke-width="1.2" marker-end="url(#rf-arr)"/>
  <line x1="618" y1="224" x2="680" y2="355" stroke="#3d4d5d" stroke-width="1.2" marker-end="url(#rf-arr)"/>

  <!-- ===== 4 VERDICTS ===== -->
  <rect x="686" y="74" width="148" height="40" rx="12" fill="#142014" stroke="#4caf50" stroke-width="1.2"/>
  <rect x="686" y="74" width="5" height="40" rx="2" fill="#4caf50"/>
  <text x="766" y="99" text-anchor="middle" fill="#81c784" font-size="12" font-weight="700" font-family="IBM Plex Mono, monospace">APPROVED</text>

  <rect x="686" y="164" width="148" height="40" rx="12" fill="#201c0c" stroke="#ffd54f" stroke-width="1.2"/>
  <rect x="686" y="164" width="5" height="40" rx="2" fill="#ffd54f"/>
  <text x="766" y="189" text-anchor="middle" fill="#ffd54f" font-size="12" font-weight="700" font-family="IBM Plex Mono, monospace">MINOR FIXES</text>

  <rect x="686" y="254" width="148" height="40" rx="12" fill="#201408" stroke="#ff9800" stroke-width="1.2"/>
  <rect x="686" y="254" width="5" height="40" rx="2" fill="#ff9800"/>
  <text x="766" y="279" text-anchor="middle" fill="#ffb74d" font-size="12" font-weight="700" font-family="IBM Plex Mono, monospace">NEEDS IMPROV.</text>

  <rect x="686" y="344" width="148" height="40" rx="12" fill="#200c0c" stroke="#f44336" stroke-width="1.2"/>
  <rect x="686" y="344" width="5" height="40" rx="2" fill="#f44336"/>
  <text x="766" y="369" text-anchor="middle" fill="#ef9a9a" font-size="12" font-weight="700" font-family="IBM Plex Mono, monospace">MUST FIX</text>

  <!-- Bottom legend -->
  <text x="430" y="410" text-anchor="middle" fill="#4a5a6a" font-size="9" font-family="IBM Plex Mono, monospace">Any Critical finding → MUST FIX regardless of vote count</text>
</svg>