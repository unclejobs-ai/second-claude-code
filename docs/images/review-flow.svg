<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" fill="none" role="img" aria-labelledby="rf-title rf-desc">
  <title id="rf-title">Multi-Perspective Review Flow</title>
  <desc id="rf-desc">Five parallel reviewers feed into a Consensus Gate that produces one of four verdicts: APPROVED, MINOR FIXES, NEEDS IMPROVEMENT, or MUST FIX.</desc>
  <defs>
    <linearGradient id="rf-bg" x1="0" y1="0" x2="860" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11161d"/>
      <stop offset="1" stop-color="#090d12"/>
    </linearGradient>
    <marker id="rf-arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,0.5 L6,2.5 L1,4.5" fill="none" stroke="#4a5e6d" stroke-width="1.2" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="400" rx="20" fill="url(#rf-bg)"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#f5f7fb" font-size="16" font-weight="700" font-family="-apple-system, Segoe UI, sans-serif">Multi-Perspective Review Flow</text>

  <!-- ===== DISPATCH ===== -->
  <rect x="30" y="160" width="100" height="60" rx="14" fill="#151e28" stroke="#32414d" stroke-width="1"/>
  <text x="80" y="186" text-anchor="middle" fill="#dce4ed" font-size="13" font-weight="700" font-family="-apple-system, sans-serif">Dispatch</text>
  <text x="80" y="204" text-anchor="middle" fill="#6b7a8a" font-size="9" font-family="IBM Plex Mono, monospace">preset-based</text>

  <!-- Dispatch → Reviewers arrows -->
  <line x1="130" y1="170" x2="170" y2="72" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="130" y1="178" x2="170" y2="142" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="130" y1="190" x2="170" y2="212" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="130" y1="200" x2="170" y2="282" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="130" y1="208" x2="170" y2="352" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>

  <!-- ===== 5 REVIEWERS ===== -->
  <!-- Xatu / deep-reviewer -->
  <rect x="175" y="50" width="260" height="44" rx="10" fill="#121820" stroke="#e57373" stroke-width="0.8"/>
  <circle cx="195" cy="72" r="5" fill="#e57373"/>
  <text x="210" y="68" fill="#f5f7fb" font-size="12" font-weight="700" font-family="-apple-system, sans-serif">Xatu</text>
  <text x="254" y="68" fill="#6b7a8a" font-size="9" font-family="IBM Plex Mono, monospace">opus</text>
  <text x="210" y="84" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">Deep Reviewer — logic, structure, completeness</text>

  <!-- Absol / devil-advocate -->
  <rect x="175" y="120" width="260" height="44" rx="10" fill="#121820" stroke="#64b5f6" stroke-width="0.8"/>
  <circle cx="195" cy="142" r="5" fill="#64b5f6"/>
  <text x="210" y="138" fill="#f5f7fb" font-size="12" font-weight="700" font-family="-apple-system, sans-serif">Absol</text>
  <text x="256" y="138" fill="#6b7a8a" font-size="9" font-family="IBM Plex Mono, monospace">sonnet</text>
  <text x="210" y="154" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">Devil's Advocate — weaknesses, blind spots</text>

  <!-- Porygon / fact-checker -->
  <rect x="175" y="190" width="260" height="44" rx="10" fill="#121820" stroke="#81c784" stroke-width="0.8"/>
  <circle cx="195" cy="212" r="5" fill="#81c784"/>
  <text x="210" y="208" fill="#f5f7fb" font-size="12" font-weight="700" font-family="-apple-system, sans-serif">Porygon</text>
  <text x="274" y="208" fill="#6b7a8a" font-size="9" font-family="IBM Plex Mono, monospace">haiku</text>
  <text x="210" y="224" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">Fact Checker — claims, numbers, sources</text>

  <!-- Jigglypuff / tone-guardian -->
  <rect x="175" y="260" width="260" height="44" rx="10" fill="#121820" stroke="#81c784" stroke-width="0.8"/>
  <circle cx="195" cy="282" r="5" fill="#81c784"/>
  <text x="210" y="278" fill="#f5f7fb" font-size="12" font-weight="700" font-family="-apple-system, sans-serif">Jigglypuff</text>
  <text x="290" y="278" fill="#6b7a8a" font-size="9" font-family="IBM Plex Mono, monospace">haiku</text>
  <text x="210" y="294" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">Tone Guardian — voice, audience fit</text>

  <!-- Unown / structure-analyst -->
  <rect x="175" y="330" width="260" height="44" rx="10" fill="#121820" stroke="#81c784" stroke-width="0.8"/>
  <circle cx="195" cy="352" r="5" fill="#81c784"/>
  <text x="210" y="348" fill="#f5f7fb" font-size="12" font-weight="700" font-family="-apple-system, sans-serif">Unown</text>
  <text x="262" y="348" fill="#6b7a8a" font-size="9" font-family="IBM Plex Mono, monospace">haiku</text>
  <text x="210" y="364" fill="#8c9aa8" font-size="10" font-family="-apple-system, sans-serif">Structure Analyst — organization, readability</text>

  <!-- Reviewers → Consensus Gate arrows -->
  <line x1="435" y1="72" x2="520" y2="170" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="435" y1="142" x2="520" y2="178" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="435" y1="212" x2="520" y2="190" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="435" y1="282" x2="520" y2="200" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="435" y1="352" x2="520" y2="210" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>

  <!-- ===== CONSENSUS GATE ===== -->
  <rect x="525" y="142" width="130" height="100" rx="16" fill="#1a1810" stroke="#c9b48f" stroke-width="1.2"/>
  <text x="590" y="174" text-anchor="middle" fill="#c9b48f" font-size="10" letter-spacing="1.5" font-weight="600" font-family="IBM Plex Mono, monospace">CONSENSUS</text>
  <text x="590" y="192" text-anchor="middle" fill="#c9b48f" font-size="10" letter-spacing="1.5" font-weight="600" font-family="IBM Plex Mono, monospace">GATE</text>
  <line x1="550" y1="202" x2="630" y2="202" stroke="#32414d" stroke-width="0.6"/>
  <text x="590" y="220" text-anchor="middle" fill="#8c9aa8" font-size="9" font-family="-apple-system, sans-serif">2/3 pass = OK</text>
  <text x="590" y="234" text-anchor="middle" fill="#8c9aa8" font-size="9" font-family="-apple-system, sans-serif">3/5 for full</text>

  <!-- Consensus → Verdicts arrows -->
  <line x1="655" y1="165" x2="700" y2="95" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="655" y1="180" x2="700" y2="175" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="655" y1="200" x2="700" y2="255" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>
  <line x1="655" y1="215" x2="700" y2="335" stroke="#3d4d5d" stroke-width="1" marker-end="url(#rf-arr)"/>

  <!-- ===== 4 VERDICTS ===== -->
  <!-- APPROVED -->
  <rect x="705" y="74" width="136" height="40" rx="10" fill="#1a2e1a" stroke="#4caf50" stroke-width="1.2"/>
  <text x="773" y="99" text-anchor="middle" fill="#81c784" font-size="12" font-weight="700" font-family="IBM Plex Mono, monospace">APPROVED</text>

  <!-- MINOR FIXES -->
  <rect x="705" y="154" width="136" height="40" rx="10" fill="#2a2818" stroke="#ffd54f" stroke-width="1.2"/>
  <text x="773" y="179" text-anchor="middle" fill="#ffd54f" font-size="12" font-weight="700" font-family="IBM Plex Mono, monospace">MINOR FIXES</text>

  <!-- NEEDS IMPROVEMENT -->
  <rect x="705" y="234" width="136" height="40" rx="10" fill="#2a1e10" stroke="#ff9800" stroke-width="1.2"/>
  <text x="773" y="250" text-anchor="middle" fill="#ffb74d" font-size="10" font-weight="700" font-family="IBM Plex Mono, monospace">NEEDS</text>
  <text x="773" y="266" text-anchor="middle" fill="#ffb74d" font-size="10" font-weight="700" font-family="IBM Plex Mono, monospace">IMPROVEMENT</text>

  <!-- MUST FIX -->
  <rect x="705" y="314" width="136" height="40" rx="10" fill="#2e1414" stroke="#f44336" stroke-width="1.2"/>
  <text x="773" y="339" text-anchor="middle" fill="#ef9a9a" font-size="12" font-weight="700" font-family="IBM Plex Mono, monospace">MUST FIX</text>
</svg>
