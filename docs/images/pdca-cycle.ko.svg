<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" fill="none" role="img" aria-labelledby="pc-title pc-desc">
  <title id="pc-title">PDCA 품질 사이클 — 액션 라우터 포함</title>
  <desc id="pc-desc">Plan, Do, Check, Act 단계별 수직 흐름도. 포켓몬 에이전트, 품질 게이트, 액션 라우터 분기를 보여줍니다.</desc>
  <defs>
    <linearGradient id="pc-bg" x1="0" y1="0" x2="860" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11161d"/>
      <stop offset="1" stop-color="#090d12"/>
    </linearGradient>
    <marker id="pc-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M1,0.5 L7,3 L1,5.5" fill="none" stroke="#4a5e6d" stroke-width="1.4" stroke-linecap="round"/>
    </marker>
    <marker id="pc-arr-plan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M1,0.5 L7,3 L1,5.5" fill="none" stroke="#5b9bd5" stroke-width="1.4" stroke-linecap="round"/>
    </marker>
    <marker id="pc-arr-do" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M1,0.5 L7,3 L1,5.5" fill="none" stroke="#7fd6c2" stroke-width="1.4" stroke-linecap="round"/>
    </marker>
    <marker id="pc-arr-loop" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M1,0.5 L7,3 L1,5.5" fill="none" stroke="#b39ddb" stroke-width="1.4" stroke-linecap="round"/>
    </marker>
    <marker id="pc-arr-ok" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M1,0.5 L7,3 L1,5.5" fill="none" stroke="#4caf50" stroke-width="1.4" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" rx="20" fill="url(#pc-bg)"/>

  <!-- ===== PLAN ===== -->
  <rect x="200" y="20" width="420" height="72" rx="16" fill="#0f1a28" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="230" y="46" fill="#5b9bd5" font-size="11" letter-spacing="2.5" font-weight="600" font-family="IBM Plex Mono, SFMono-Regular, monospace">PLAN</text>
  <text x="290" y="46" fill="#dce4ed" font-size="14" font-weight="700" font-family="Apple SD Gothic Neo, Malgun Gothic, Noto Sans KR, sans-serif">수집 (Gather)</text>
  <text x="230" y="66" fill="#8c9aa8" font-size="11" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">질문 프로토콜 → 리서치 → 분석</text>
  <text x="230" y="82" fill="#6b7a8a" font-size="10" font-family="IBM Plex Mono, monospace">이브이 · 후딘 · 뮤츠</text>

  <!-- Gate: Plan → Do -->
  <line x1="410" y1="92" x2="410" y2="124" stroke="#3d4d5d" stroke-width="1.5" marker-end="url(#pc-arr)"/>
  <rect x="300" y="100" width="220" height="22" rx="6" fill="#151e28" stroke="#32414d" stroke-width="0.8"/>
  <text x="410" y="115" text-anchor="middle" fill="#7a8a9a" font-size="9" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">브리프 + 분석 완료? 소스 ≥ 3개?</text>

  <!-- ===== DO ===== -->
  <rect x="200" y="130" width="420" height="72" rx="16" fill="#0f201a" stroke="#7fd6c2" stroke-width="1.2"/>
  <text x="230" y="156" fill="#7fd6c2" font-size="11" letter-spacing="2.5" font-weight="600" font-family="IBM Plex Mono, monospace">DO</text>
  <text x="275" y="156" fill="#dce4ed" font-size="14" font-weight="700" font-family="Apple SD Gothic Neo, Malgun Gothic, Noto Sans KR, sans-serif">생산 (Produce)</text>
  <text x="230" y="176" fill="#8c9aa8" font-size="11" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">write --skip-research --skip-review (순수 실행)</text>
  <text x="230" y="192" fill="#6b7a8a" font-size="10" font-family="IBM Plex Mono, monospace">루브도 (Smeargle)</text>

  <!-- Gate: Do → Check -->
  <line x1="410" y1="202" x2="410" y2="234" stroke="#3d4d5d" stroke-width="1.5" marker-end="url(#pc-arr)"/>
  <rect x="300" y="210" width="220" height="22" rx="6" fill="#151e28" stroke="#32414d" stroke-width="0.8"/>
  <text x="410" y="225" text-anchor="middle" fill="#7a8a9a" font-size="9" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">산출물 완성? 포맷 정상?</text>

  <!-- ===== CHECK ===== -->
  <rect x="200" y="240" width="420" height="72" rx="16" fill="#1a1810" stroke="#c9b48f" stroke-width="1.2"/>
  <text x="230" y="266" fill="#c9b48f" font-size="11" letter-spacing="2.5" font-weight="600" font-family="IBM Plex Mono, monospace">CHECK</text>
  <text x="300" y="266" fill="#dce4ed" font-size="14" font-weight="700" font-family="Apple SD Gothic Neo, Malgun Gothic, Noto Sans KR, sans-serif">검증 (Verify)</text>
  <text x="230" y="286" fill="#8c9aa8" font-size="11" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">5명 병렬 리뷰어 → 합의 게이트 → 판정</text>
  <text x="230" y="302" fill="#6b7a8a" font-size="10" font-family="IBM Plex Mono, monospace">네이티오 · 앱솔 · 폴리곤 · 푸린 · 안농</text>

  <!-- Check verdict split -->
  <!-- APPROVED branch (right) -->
  <line x1="620" y1="276" x2="690" y2="276" stroke="#4caf50" stroke-width="1.5" marker-end="url(#pc-arr-ok)"/>
  <rect x="698" y="260" width="120" height="32" rx="10" fill="#1a2e1a" stroke="#4caf50" stroke-width="1.2"/>
  <text x="758" y="280" text-anchor="middle" fill="#81c784" font-size="12" font-weight="700" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">승인 (PASS)</text>

  <!-- NOT APPROVED branch (down) -->
  <line x1="410" y1="312" x2="410" y2="346" stroke="#3d4d5d" stroke-width="1.5" marker-end="url(#pc-arr)"/>
  <text x="434" y="335" fill="#7a8a9a" font-size="9" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">피드백</text>

  <!-- ===== ACT ===== -->
  <rect x="290" y="350" width="240" height="56" rx="16" fill="#18102a" stroke="#b39ddb" stroke-width="1.2"/>
  <text x="320" y="374" fill="#b39ddb" font-size="11" letter-spacing="2.5" font-weight="600" font-family="IBM Plex Mono, monospace">ACT</text>
  <text x="365" y="374" fill="#dce4ed" font-size="14" font-weight="700" font-family="Apple SD Gothic Neo, Malgun Gothic, Noto Sans KR, sans-serif">개선 (Refine)</text>
  <text x="320" y="394" fill="#6b7a8a" font-size="10" font-family="IBM Plex Mono, monospace">메타몽 · 액션 라우터</text>

  <!-- Arrow from Act to Action Router -->
  <line x1="410" y1="406" x2="410" y2="432" stroke="#3d4d5d" stroke-width="1.5" marker-end="url(#pc-arr)"/>

  <!-- ===== ACTION ROUTER (diamond) ===== -->
  <polygon points="410,432 460,458 410,484 360,458" fill="#1a1428" stroke="#b39ddb" stroke-width="1.2"/>
  <text x="410" y="456" text-anchor="middle" fill="#b39ddb" font-size="9" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">액션</text>
  <text x="410" y="468" text-anchor="middle" fill="#b39ddb" font-size="9" font-weight="600" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">라우터</text>

  <!-- Route: → Plan (left) -->
  <line x1="360" y1="458" x2="240" y2="458" stroke="#5b9bd5" stroke-width="1.2" stroke-dasharray="4 3"/>
  <path d="M240,458 L240,56 L200,56" stroke="#5b9bd5" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#pc-arr-plan)"/>
  <rect x="100" y="444" width="130" height="28" rx="8" fill="#0f1a28" stroke="#5b9bd5" stroke-width="0.8"/>
  <text x="165" y="463" text-anchor="middle" fill="#5b9bd5" font-size="10" font-weight="600" font-family="IBM Plex Mono, monospace">→ PLAN</text>
  <text x="165" y="487" text-anchor="middle" fill="#5a7a9a" font-size="9" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">소스 / 가정 오류</text>

  <!-- Route: → Do (center-left) -->
  <rect x="332" y="496" width="110" height="28" rx="8" fill="#0f201a" stroke="#7fd6c2" stroke-width="0.8"/>
  <text x="387" y="515" text-anchor="middle" fill="#7fd6c2" font-size="10" font-weight="600" font-family="IBM Plex Mono, monospace">→ DO</text>
  <line x1="398" y1="484" x2="387" y2="496" stroke="#7fd6c2" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#pc-arr-do)"/>
  <text x="387" y="537" text-anchor="middle" fill="#5a9a7a" font-size="9" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">완성도 / 포맷 문제</text>

  <!-- → Do return path -->
  <path d="M332,510 L280,510 L280,166 L200,166" stroke="#7fd6c2" stroke-width="1" stroke-dasharray="3 4" fill="none" marker-end="url(#pc-arr-do)"/>

  <!-- Route: → Loop (right) -->
  <line x1="460" y1="458" x2="560" y2="458" stroke="#b39ddb" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#pc-arr-loop)"/>
  <rect x="568" y="444" width="100" height="28" rx="8" fill="#18102a" stroke="#b39ddb" stroke-width="0.8"/>
  <text x="618" y="463" text-anchor="middle" fill="#b39ddb" font-size="10" font-weight="600" font-family="IBM Plex Mono, monospace">→ LOOP</text>
  <text x="618" y="487" text-anchor="middle" fill="#8a6aaa" font-size="9" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">실행 품질 미달</text>

  <!-- Loop → re-verify arrow -->
  <path d="M668,458 L740,458 L740,276 L620,276" stroke="#b39ddb" stroke-width="1" stroke-dasharray="3 4" fill="none" marker-end="url(#pc-arr-loop)"/>
  <text x="752" y="370" fill="#8a6aaa" font-size="8" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" transform="rotate(-90 752 370)">재검증</text>
</svg>