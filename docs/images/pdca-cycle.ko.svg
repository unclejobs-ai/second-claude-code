<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 600" fill="none" role="img" aria-labelledby="pc-title pc-desc">
  <title id="pc-title">PDCA 품질 사이클</title>
  <desc id="pc-desc">Plan → Do → Check → Act 흐름도. 액션 라우터가 리뷰 실패를 근본원인별로 분류.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="780" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0e1117"/><stop offset="1" stop-color="#0a0d12"/>
    </linearGradient>
  </defs>

  <rect width="780" height="600" rx="16" fill="url(#bg)"/>

  <!-- ===== PLAN ===== -->
  <rect x="140" y="28" width="460" height="56" rx="8" fill="#0e141e" stroke="#3d6a9e" stroke-width="0.8"/>
  <text x="164" y="52" fill="#5b9bd5" font-size="10" letter-spacing="3" font-weight="600" font-family="SF Mono, IBM Plex Mono, monospace">PLAN</text>
  <text x="220" y="52" fill="#d0d8e0" font-size="13" font-weight="600" font-family="Apple SD Gothic Neo, -apple-system, sans-serif">수집</text>
  <text x="164" y="72" fill="#6a7a8a" font-size="9.5" font-family="Apple SD Gothic Neo, sans-serif">질문 프로토콜 → 리서치 → 분석</text>
  <text x="460" y="72" fill="#4a5a6a" font-size="9" font-family="SF Mono, monospace">이브이 · 후딘 · 뮤츠</text>

  <!-- gate -->
  <line x1="370" y1="84" x2="370" y2="106" stroke="#252f3a" stroke-width="0.8"/>
  <text x="390" y="98" fill="#3a4a5a" font-size="7.5" font-family="Apple SD Gothic Neo, sans-serif">브리프 완료? 소스 ≥ 3?</text>

  <!-- ===== DO ===== -->
  <rect x="140" y="110" width="460" height="56" rx="8" fill="#0e1a14" stroke="#4a9a7a" stroke-width="0.8"/>
  <text x="164" y="134" fill="#7fd6c2" font-size="10" letter-spacing="3" font-weight="600" font-family="SF Mono, IBM Plex Mono, monospace">DO</text>
  <text x="200" y="134" fill="#d0d8e0" font-size="13" font-weight="600" font-family="Apple SD Gothic Neo, sans-serif">생산</text>
  <text x="164" y="154" fill="#6a7a8a" font-size="9.5" font-family="Apple SD Gothic Neo, sans-serif">write --skip-research --skip-review</text>
  <text x="460" y="154" fill="#4a5a6a" font-size="9" font-family="SF Mono, monospace">루브도</text>

  <!-- gate -->
  <line x1="370" y1="166" x2="370" y2="188" stroke="#252f3a" stroke-width="0.8"/>
  <text x="390" y="180" fill="#3a4a5a" font-size="7.5" font-family="Apple SD Gothic Neo, sans-serif">산출물 완성?</text>

  <!-- ===== CHECK ===== -->
  <rect x="140" y="192" width="460" height="56" rx="8" fill="#14120a" stroke="#9a8a5a" stroke-width="0.8"/>
  <text x="164" y="216" fill="#c9b48f" font-size="10" letter-spacing="3" font-weight="600" font-family="SF Mono, IBM Plex Mono, monospace">CHECK</text>
  <text x="234" y="216" fill="#d0d8e0" font-size="13" font-weight="600" font-family="Apple SD Gothic Neo, sans-serif">검증</text>
  <text x="164" y="236" fill="#6a7a8a" font-size="9.5" font-family="Apple SD Gothic Neo, sans-serif">5명 병렬 리뷰 → 합의 게이트 → 판정</text>
  <text x="460" y="236" fill="#4a5a6a" font-size="9" font-family="SF Mono, monospace">네이티오 · 앱솔 +3</text>

  <!-- APPROVED -->
  <line x1="600" y1="220" x2="636" y2="220" stroke="#3a6a3a" stroke-width="1"/>
  <rect x="640" y="206" width="108" height="28" rx="6" fill="#0e180e" stroke="#4a8a4a" stroke-width="0.8"/>
  <text x="694" y="224" text-anchor="middle" fill="#6aaa6a" font-size="11" font-weight="600" font-family="SF Mono, monospace">PASS</text>

  <!-- feedback -->
  <line x1="370" y1="248" x2="370" y2="272" stroke="#252f3a" stroke-width="0.8"/>
  <text x="390" y="264" fill="#3a4a5a" font-size="7.5" font-family="Apple SD Gothic Neo, sans-serif">피드백</text>

  <!-- ===== ACT ===== -->
  <rect x="140" y="276" width="460" height="56" rx="8" fill="#120e1e" stroke="#7a5aaa" stroke-width="0.8"/>
  <text x="164" y="300" fill="#b39ddb" font-size="10" letter-spacing="3" font-weight="600" font-family="SF Mono, IBM Plex Mono, monospace">ACT</text>
  <text x="206" y="300" fill="#d0d8e0" font-size="13" font-weight="600" font-family="Apple SD Gothic Neo, sans-serif">개선</text>
  <text x="164" y="320" fill="#6a7a8a" font-size="9.5" font-family="Apple SD Gothic Neo, sans-serif">피드백을 근본원인별로 분류 → 해당 단계로 재투입</text>
  <text x="530" y="320" fill="#4a5a6a" font-size="9" font-family="SF Mono, monospace">메타몽</text>

  <!-- ===== TRANSITION TO ROUTER ===== -->
  <line x1="370" y1="332" x2="370" y2="372" stroke="#b39ddb" stroke-width="0.8" stroke-dasharray="4 6"/>

  <!-- ===== ACTION ROUTER ===== -->
  <!-- Single clean circle — no orbital rings, no glow dots -->
  <circle cx="370" cy="416" r="42" fill="#140e22" stroke="#b39ddb" stroke-width="1.2"/>
  <text x="370" y="410" text-anchor="middle" fill="#d0c8e0" font-size="10" font-weight="600" letter-spacing="1" font-family="SF Mono, monospace">ACTION</text>
  <text x="370" y="426" text-anchor="middle" fill="#d0c8e0" font-size="10" font-weight="600" letter-spacing="1" font-family="SF Mono, monospace">ROUTER</text>

  <!-- ===== THREE ROUTES ===== -->
  <!-- Thin, precise lines — no dashes, solid with low opacity -->

  <!-- LEFT → PLAN -->
  <line x1="328" y1="416" x2="184" y2="416" stroke="#5b9bd5" stroke-width="1.2" opacity=".6"/>
  <rect x="28" y="388" width="150" height="76" rx="8" fill="#0e141e" stroke="#3d6a9e" stroke-width="0.8"/>
  <rect x="28" y="388" width="3" height="76" rx="1.5" fill="#5b9bd5"/>
  <text x="48" y="412" fill="#5b9bd5" font-size="12" font-weight="700" font-family="SF Mono, monospace">↻ PLAN</text>
  <text x="48" y="430" fill="#7a9aba" font-size="10" font-family="Apple SD Gothic Neo, sans-serif">소스 / 가정 오류</text>
  <text x="48" y="450" fill="#4a6a8a" font-size="9" font-family="Apple SD Gothic Neo, sans-serif">리서치를 다시 수행</text>

  <!-- DOWN → DO -->
  <line x1="370" y1="458" x2="370" y2="498" stroke="#7fd6c2" stroke-width="1.2" opacity=".6"/>
  <rect x="295" y="502" width="150" height="76" rx="8" fill="#0e1a14" stroke="#4a9a7a" stroke-width="0.8"/>
  <rect x="295" y="502" width="3" height="76" rx="1.5" fill="#7fd6c2"/>
  <text x="315" y="526" fill="#7fd6c2" font-size="12" font-weight="700" font-family="SF Mono, monospace">↻ DO</text>
  <text x="315" y="544" fill="#7aaaa0" font-size="10" font-family="Apple SD Gothic Neo, sans-serif">완성도 / 포맷 문제</text>
  <text x="315" y="564" fill="#4a8a7a" font-size="9" font-family="Apple SD Gothic Neo, sans-serif">누락 섹션 재작성</text>

  <!-- RIGHT → LOOP -->
  <line x1="412" y1="416" x2="564" y2="416" stroke="#b39ddb" stroke-width="1.2" opacity=".6"/>
  <rect x="570" y="388" width="180" height="76" rx="8" fill="#120e1e" stroke="#7a5aaa" stroke-width="0.8"/>
  <rect x="747" y="388" width="3" height="76" rx="1.5" fill="#b39ddb"/>
  <text x="590" y="412" fill="#b39ddb" font-size="12" font-weight="700" font-family="SF Mono, monospace">↻ LOOP → CHECK</text>
  <text x="590" y="430" fill="#9a8aba" font-size="10" font-family="Apple SD Gothic Neo, sans-serif">실행 품질 미달</text>
  <text x="590" y="450" fill="#6a5a8a" font-size="9" font-family="Apple SD Gothic Neo, sans-serif">다듬고 재검증</text>
</svg>